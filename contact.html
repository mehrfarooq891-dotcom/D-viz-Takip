<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İletişim | DövizTakip - Bize Ulaşın</title>
    <meta name="description" content="DövizTakip ekibiyle iletişime geçin. Türkiye için ücretsiz döviz ve enflasyon hesaplayıcı hakkında sorularınızı bekliyoruz.">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --navy: #0f172a;
            --navy-light: #1e293b;
            --gold: #f59e0b;
            --white: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --font-sans: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--navy);
            color: var(--white);
            font-family: var(--font-sans);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Navigation */
        .navbar {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 16px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-links {
            display: flex;
            gap: 24px;
        }

        .nav-link {
            color: var(--white);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-link:hover, .nav-link.active {
            color: var(--gold);
        }

        .nav-logo {
            font-family: var(--font-mono);
            font-weight: 700;
            color: var(--gold);
            text-decoration: none;
            font-size: 18px;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 10px;
        }

        .hamburger span {
            display: block;
            width: 25px;
            height: 2px;
            background: var(--gold);
            border-radius: 2px;
        }

        @media (max-width: 768px) {
            .hamburger { display: flex; }
            .nav-links {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                background: var(--navy-light);
                padding: 24px;
                border-bottom: 1px solid var(--border);
                gap: 16px;
                text-align: center;
            }
            .nav-links.active { display: flex; }
        }

        /* Contact Styles */
        .contact-section {
            padding: 80px 0;
        }

        .contact-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .contact-header h1 {
            font-family: var(--font-mono);
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--gold);
        }

        .contact-header p {
            font-size: 20px;
            color: var(--text-muted);
        }

        .contact-container {
            max-width: 600px;
            margin: 0 auto;
        }

        .form-card {
            background: var(--navy-light);
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 24px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input {
            width: 100%;
            background: var(--navy);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 16px;
            color: var(--white);
            font-family: var(--font-sans);
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-input:focus {
            border-color: var(--gold);
        }

        textarea.form-input {
            resize: vertical;
        }

        .submit-btn {
            width: 100%;
            background: var(--gold);
            color: var(--navy);
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .submit-btn:hover {
            opacity: 0.9;
        }

        .info-box {
            margin-top: 40px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            padding: 24px;
            border-radius: 16px;
            text-align: center;
            font-size: 14px;
        }

        .info-box a {
            color: var(--gold);
            text-decoration: none;
        }

        .seo-footer {
            margin-top: 80px;
            padding: 40px 0;
            border-top: 1px solid var(--border);
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
        }

        footer {
            padding: 40px 0;
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="container nav-content">
            <a href="index.html" class="nav-logo">DövizTakip</a>
            
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <div class="nav-links" id="nav-links">
                <a href="index.html" class="nav-link">Home</a>
                <a href="about.html" class="nav-link">About</a>
                <a href="contact.html" class="nav-link active">Contact</a>
            </div>
        </div>
    </nav>

    <main class="container contact-section">
        <header class="contact-header">
            <h1>Contact Us</h1>
            <p>Have a question or suggestion? We would love to hear from you.</p>
        </header>

        <div class="contact-container">
            <div class="form-card">
                <form action="https://formspree.io/f/YOUR_FORMSPREE_ID" method="POST">
                    <div class="form-group">
                        <label class="form-label" for="name">Name</label>
                        <input type="text" name="name" id="name" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="email">Email</label>
                        <input type="email" name="email" id="email" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="subject">Subject</label>
                        <input type="text" name="subject" id="subject" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="message">Message</label>
                        <textarea name="message" id="message" class="form-input" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="submit-btn" id="submit-btn">Send Message</button>
                </form>
            </div>

            <div class="info-box">
                Prefer email? Write to us at: <a href="mailto:contact@toolsvault.com">contact@toolsvault.com</a>
            </div>
        </div>

        <div class="seo-footer">
            <p>Contact the team behind DövizTakip — a free currency and inflation calculator for Turkey.</p>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>© 2026 DövizTakip</p>
        </div>
    </footer>

    <script>
        document.getElementById('hamburger').onclick = () => {
            document.getElementById('nav-links').classList.toggle('active');
        };
    </script>
</body>
</html>
